<!DOCTYPE html>
<html lang="en">
<head>
  <title>Daily Earn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f2027;
      color: white;
      text-align: center;
    }
    .card {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 20px;
      margin: 60px auto;
      width: 90%;
      max-width: 350px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      border: 2px solid #eee;
      font-size: 16px;
    }
    .btn {
      background: #2193b0;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
    }
    #main-app {
      display: none;
    }
    .balance-box {
      background: linear-gradient(to right, #2193b0, #6dd5ed);
      padding: 40px 20px;
    }
  </style>
</head>
<body>

  <!-- Authentication Page -->
  <div id="auth-page">
    <div class="card">
      <h2 style="color:#2193b0;">DAILY EARN</h2>
      <p style="color:green;font-weight:bold;">$100 BONUS ACTIVE</p>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button class="btn" onclick="register()">Register / Login</button>
    </div>
  </div>

  <!-- Main App Page -->
  <div id="main-app">
    <div class="balance-box">
      <p>AVAILABLE BALANCE</p>
      <h1>$<span id="bal-val">0</span></h1>
      <button onclick="addDaily()" style="background:#f1c40f;color:black;border:none;padding:10px 20px;border-radius:20px;font-weight:bold;">
        🎁 GET DAILY $10
      </button>
      <br><br>
      <button onclick="logout()" class="btn">Logout</button>
    </div>
  </div>

  <!-- Firebase v8 CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDWd8bqsCIKJrjXdjhfUJg9edDrXQ6uKvk",
      authDomain: "daily-ean.firebaseapp.com",
      databaseURL: "https://daily-ean-default-rtdb.firebaseio.com",
      projectId: "daily-ean",
      storageBucket: "daily-ean.appspot.com",
      messagingSenderId: "465909343560",
      appId: "1:465909343560:web:7597e8babe18ec6553ff7d"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Firebase references
    const auth = firebase.auth();
    const database = firebase.database();

    // Register or login user
    function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email === "" || password === "") {
        alert("Please enter email and password");
        return;
      }

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          database.ref("users/" + user.uid).set({
            balance: 100
          });
          loadUser();
        })
        .catch(() => {
          // If user already exists, try to log in
          auth.signInWithEmailAndPassword(email, password)
            .then(() => {
              loadUser();
            })
            .catch(error => {
              alert(error.message);
            });
        });
    }

    // Load user data and show main app
    function loadUser() {
      auth.onAuthStateChanged(user => {
        if (user) {
          document.getElementById("auth-page").style.display = "none";
          document.getElementById("main-app").style.display = "block";

          // Listen to balance updates
          database.ref("users/" + user.uid + "/balance")
            .on("value", (snapshot) => {
              document.getElementById("bal-val").innerText = snapshot.val();
            });
        }
      });
    }

    // Add daily bonus
    function addDaily() {
      const user = auth.currentUser;
      if (user) {
        const ref = database.ref("users/" + user.uid + "/balance");
        ref.once("value").then(snapshot => {
          let current = snapshot.val();
          ref.set(current + 10);
        });
      }
    }

    // Logout user
    function logout() {
      auth.signOut().then(() => {
        location.reload();
      });
    }

    // Check if user is already logged in
    loadUser();
  </script>

</body>
</html>
